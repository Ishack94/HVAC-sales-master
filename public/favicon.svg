  <rect x="27" y="78" width="9" height="18" rx="1" fill="#2d3b4a"/>
  <rect x="39" y="68" width="9" height="28" rx="1" fill="#2d3b4a"/>
  <rect x="51" y="58" width="9" height="38" rx="1" fill="#2d3b4a"/>
  <rect x="63" y="48" width="9" height="48" rx="1" fill="#2d3b4a"/>
  <rect x="75" y="38" width="9" height="58" rx="1" fill="#2d3b4a"/>
  <!-- Arrow curve -->
  <path
    d="M24 84 C30 66, 46 38, 80 14"
    stroke="#e87722"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
