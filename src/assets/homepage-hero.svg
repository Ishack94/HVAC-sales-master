<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Furnace outline -->
  <rect x="650" y="140" width="180" height="280" rx="8" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Furnace vents -->
  <line x1="670" y1="180" x2="810" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="670" y1="210" x2="810" y2="210" stroke="#555" stroke-width="2"/>
  <line x1="670" y1="240" x2="810" y2="240" stroke="#555" stroke-width="2"/>
  <!-- Furnace panel -->
  <rect x="680" y="280" width="120" height="100" rx="4" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Furnace flame icon -->
  <ellipse cx="740" cy="340" rx="15" ry="20" fill="none" stroke="#555" stroke-width="2"/>

  <!-- Hand (simplified) -->
  <rect x="380" y="220" width="60" height="100" rx="10" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Fingers -->
  <rect x="385" y="190" width="12" height="40" rx="6" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="402" y="182" width="12" height="48" rx="6" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="419" y="186" width="12" height="44" rx="6" fill="none" stroke="#555" stroke-width="2"/>

  <!-- Clamp meter body -->
  <rect x="460" y="180" width="80" height="120" rx="6" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Clamp meter display -->
  <rect x="472" y="195" width="56" height="35" rx="3" fill="#333" stroke="#555" stroke-width="2"/>
  <!-- Display text -->
  <text x="500" y="218" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">24.5A</text>
  <!-- Clamp jaws -->
  <path d="M 540 180 Q 580 140 580 200 Q 580 160 540 180" fill="none" stroke="#555" stroke-width="3"/>
  <path d="M 540 180 Q 570 120 590 180" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Wire going through clamp -->
  <line x1="565" y1="100" x2="565" y2="260" stroke="#555" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Label -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">HVAC Technician with Clamp Meter</text>
</svg>