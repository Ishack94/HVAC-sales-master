<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Counter surface -->
  <rect x="200" y="320" width="800" height="20" rx="2" fill="#555"/>
  <!-- Counter front -->
  <rect x="200" y="340" width="800" height="120" rx="0" fill="#333"/>
  <!-- Counter cabinet lines -->
  <line x1="500" y1="340" x2="500" y2="460" stroke="#444" stroke-width="2"/>
  <line x1="700" y1="340" x2="700" y2="460" stroke="#444" stroke-width="2"/>
  <!-- Cabinet handles -->
  <line x1="340" y1="385" x2="370" y2="385" stroke="#555" stroke-width="3"/>
  <line x1="590" y1="385" x2="620" y2="385" stroke="#555" stroke-width="3"/>
  <line x1="790" y1="385" x2="820" y2="385" stroke="#555" stroke-width="3"/>

  <!-- Laptop base -->
  <path d="M 460 320 L 480 230 L 720 230 L 740 320 Z" fill="#333" stroke="#555" stroke-width="2"/>
  <!-- Laptop screen -->
  <rect x="490" y="130" width="220" height="100" rx="4" fill="#222" stroke="#555" stroke-width="2"/>
  <!-- Screen content - simple chart -->
  <rect x="510" y="155" width="30" height="50" fill="#555" opacity="0.5"/>
  <rect x="550" y="145" width="30" height="60" fill="#555" opacity="0.5"/>
  <rect x="590" y="160" width="30" height="45" fill="#555" opacity="0.5"/>
  <rect x="630" y="140" width="30" height="65" fill="#555" opacity="0.5"/>
  <!-- Laptop hinge -->
  <line x1="480" y1="230" x2="720" y2="230" stroke="#555" stroke-width="3"/>

  <!-- Coffee mug -->
  <rect x="790" y="280" width="40" height="40" rx="4" fill="none" stroke="#555" stroke-width="2"/>
  <path d="M 830 290 Q 850 290 850 305 Q 850 318 830 318" fill="none" stroke="#555" stroke-width="2"/>

  <!-- Papers/documents -->
  <rect x="320" y="280" width="80" height="40" rx="2" fill="none" stroke="#555" stroke-width="2" transform="rotate(-5,360,300)"/>
  <line x1="330" y1="292" x2="390" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="302" x2="390" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="312" x2="370" y2="310" stroke="#555" stroke-width="1"/>

  <!-- Label -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Kitchen Counter Sales Consultation</text>
</svg>