<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Roof peak -->
  <line x1="0" y1="300" x2="600" y2="60" stroke="#555" stroke-width="3"/>
  <line x1="600" y1="60" x2="1200" y2="300" stroke="#555" stroke-width="3"/>

  <!-- Roof trusses (left side) -->
  <line x1="150" y1="262" x2="150" y2="460" stroke="#555" stroke-width="3"/>
  <line x1="150" y1="262" x2="600" y2="60" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <line x1="350" y1="178" x2="350" y2="460" stroke="#555" stroke-width="3"/>

  <line x1="550" y1="95" x2="550" y2="460" stroke="#555" stroke-width="3"/>

  <line x1="750" y1="128" x2="750" y2="460" stroke="#555" stroke-width="3"/>

  <line x1="950" y1="210" x2="950" y2="460" stroke="#555" stroke-width="3"/>

  <!-- Cross braces on trusses -->
  <line x1="150" y1="350" x2="350" y2="350" stroke="#555" stroke-width="2"/>
  <line x1="350" y1="350" x2="550" y2="350" stroke="#555" stroke-width="2"/>
  <line x1="550" y1="350" x2="750" y2="350" stroke="#555" stroke-width="2"/>
  <line x1="750" y1="350" x2="950" y2="350" stroke="#555" stroke-width="2"/>

  <!-- Attic floor / ceiling joists -->
  <rect x="50" y="460" width="1100" height="8" fill="#444"/>

  <!-- Flex duct run 1 (main trunk) -->
  <path d="M 120 280 Q 250 300 400 270 Q 550 240 700 260 Q 850 280 1050 250" fill="none" stroke="#555" stroke-width="16" stroke-linecap="round"/>
  <!-- Duct ridges (flex duct texture) -->
  <path d="M 120 280 Q 250 300 400 270 Q 550 240 700 260 Q 850 280 1050 250" fill="none" stroke="#444" stroke-width="18" stroke-linecap="round" stroke-dasharray="3,8"/>

  <!-- Flex duct branch going down-left -->
  <path d="M 350 285 Q 320 340 280 400 Q 260 440 250 460" fill="none" stroke="#555" stroke-width="12" stroke-linecap="round"/>
  <path d="M 350 285 Q 320 340 280 400 Q 260 440 250 460" fill="none" stroke="#444" stroke-width="14" stroke-linecap="round" stroke-dasharray="3,7"/>

  <!-- Flex duct branch going down-right -->
  <path d="M 750 265 Q 770 330 790 400 Q 800 440 810 460" fill="none" stroke="#555" stroke-width="12" stroke-linecap="round"/>
  <path d="M 750 265 Q 770 330 790 400 Q 800 440 810 460" fill="none" stroke="#444" stroke-width="14" stroke-linecap="round" stroke-dasharray="3,7"/>

  <!-- Register boot at branch ends -->
  <rect x="230" y="448" width="40" height="16" rx="2" fill="#444" stroke="#555" stroke-width="2"/>
  <rect x="790" y="448" width="40" height="16" rx="2" fill="#444" stroke="#555" stroke-width="2"/>

  <!-- Duct tape / connection bands -->
  <rect x="340" y="278" width="20" height="16" rx="2" fill="none" stroke="#666" stroke-width="1.5"/>
  <rect x="740" y="258" width="20" height="16" rx="2" fill="none" stroke="#666" stroke-width="1.5"/>

  <!-- Insulation tufts between joists -->
  <path d="M 50 458 Q 100 440 150 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 150 458 Q 250 435 350 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 350 458 Q 450 435 550 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 550 458 Q 650 435 750 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 750 458 Q 850 435 950 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 950 458 Q 1050 435 1150 458" fill="none" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Label -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff">Attic Flex Ductwork</text>
</svg>